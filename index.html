<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiniela Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.hdr{background:#1a6b3c;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr h1{font-size:1rem;font-weight:700;flex:1}.hdr-sub{font-size:.72rem;opacity:.85}
.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:1rem;overflow:hidden}
.card-hdr{padding:11px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.card-hdr h2{font-size:.9rem;font-weight:700;flex:1}
.badge{padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.b-blue{background:#bee3f8;color:#2b6cb0}.b-amber{background:#fefcbf;color:#744210}.b-green{background:#c6f6d5;color:#276749}
.hero{text-align:center;padding:2.5rem 1rem 1.5rem}
.hero .emo{font-size:3rem;margin-bottom:.75rem}
.hero h2{font-size:1.6rem;font-weight:800;color:#1a6b3c;margin-bottom:.5rem;letter-spacing:-.02em}
.hero p{color:#718096;font-size:.9rem;line-height:1.6;max-width:420px;margin:0 auto 1.5rem}
input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:#1a6b3c}
.btn{padding:11px 22px;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn-g{background:#1a6b3c;color:#fff}.btn-g:hover{background:#276749}.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:#fff;color:#4a5568;border:1.5px solid #e2e8f0}.btn-o:hover{border-color:#a0aec0}
.btn-gold{background:#c8952a;color:#fff}.btn-gold:hover{background:#a87820}
.btn-block{width:100%;margin-top:.5rem}
.prog{height:4px;background:#e2e8f0;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.prog-bar{height:100%;background:#1a6b3c;border-radius:4px;transition:width .3s}
.steps{display:flex;gap:5px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.step{padding:5px 10px;border-radius:20px;font-size:.68rem;font-weight:500;border:1.5px solid #e2e8f0;white-space:nowrap;color:#718096;background:#fff;flex-shrink:0}
.step.done{border-color:#1a6b3c;background:#f0fff4;color:#276749}
.step.active{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid #e2e8f0}

/* ── GROUPS: click to rank ── */
.groups-all{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.group-card{background:#fff;border-radius:10px;border:1.5px solid #e2e8f0;overflow:hidden}
.group-hdr{padding:8px 12px;background:#1a6b3c;color:#fff;font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.group-hdr small{font-size:.65rem;opacity:.8;font-weight:400}
.team-btn-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #f0f4f8;transition:background .1s}
.team-btn-row:last-child{border-bottom:none}
.team-btn-row.ranked-1{background:#f0fff4}
.team-btn-row.ranked-2{background:#f0fff4}
.team-btn-row.ranked-3{background:#fffbf0}
.team-btn-row.ranked-4{background:#fff}
.rank-badge{width:32px;height:44px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;cursor:pointer}
.rb-1{color:#fff;background:#1a6b3c}
.rb-2{color:#fff;background:#276749}
.rb-3{color:#744210;background:#fefcbf}
.rb-4{color:#9ca3af;background:#f3f4f6}
.rb-empty{color:#cbd5e0;background:#f9fafb;font-size:1rem}
.team-info{flex:1;display:flex;align-items:center;gap:8px;padding:10px 10px 10px 0;cursor:pointer}
.team-flag{font-size:1.1rem}
.team-name-txt{font-size:.82rem;font-weight:500}
.team-btn-row:hover .team-info{background:transparent}
.team-btn-row.ranked-1 .team-name-txt,.team-btn-row.ranked-2 .team-name-txt{font-weight:600;color:#1a6b3c}

/* ── THIRDS ── */
.thirds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.third-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none;font-family:inherit;font-size:.82rem;text-align:left;width:100%}
.third-btn.selected{border-color:#1a6b3c;background:#f0fff4}
.third-btn .chk{width:18px;height:18px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;transition:all .12s}
.third-btn.selected .chk{background:#1a6b3c;border-color:#1a6b3c;color:#fff}

/* ── MATCHES ── */
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff;transition:border-color .15s}
.match-card.done{border-color:#c6f6d5}
.match-lbl{font-size:.68rem;color:#fff;padding:5px 12px;font-weight:600;background:#1a3a5c;display:flex;justify-content:space-between;align-items:center}
.match-lbl span{opacity:.75;font-size:.62rem;font-weight:400}
.match-team{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s}
.match-team:hover{background:#f7fafc}.match-team.winner{background:#f0fff4}
.match-team.winner .team-name-txt{color:#276749;font-weight:700}
.match-team.pending{cursor:not-allowed;opacity:.4}
.win-icon{font-size:.8rem;color:#1a6b3c;opacity:0;margin-left:auto;transition:opacity .12s}
.match-team.winner .win-icon{opacity:1}
.mdiv{height:1px;background:#f0f4f8;margin:0 12px}
.round-hdr{background:#1a3a5c;color:#fff;border-radius:8px;padding:8px 14px;margin-bottom:10px;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.round-hdr small{font-size:.68rem;opacity:.75;font-weight:400}

/* ── GOLEADOR ── */
.scorer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-top:10px}
.scorer-btn{padding:8px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;background:#f7fafc;color:#4a5568;border:1.5px solid #e2e8f0;font-family:inherit;transition:all .12s;text-align:left}
.scorer-btn:hover{border-color:#1a6b3c;color:#1a6b3c;background:#f0fff4}
.scorer-btn.selected{background:#1a6b3c;color:#fff;border-color:#1a6b3c}

/* ── CHAMP BOX ── */
.champ-box{text-align:center;padding:1.25rem;border:2px solid #d69e2e;border-radius:10px;background:#fffbf0;margin-bottom:1rem}
.champ-box .trophy{font-size:2rem;margin-bottom:.4rem}
.champ-box h3{font-size:.78rem;font-weight:600;color:#744210;margin-bottom:.25rem}
.champ-box .team{font-size:1.2rem;font-weight:800}

/* ── DONE ── */
.done-hero{text-align:center;padding:2.5rem 1rem}
.done-hero .emo{font-size:3.5rem;margin-bottom:1rem}
.done-hero h2{font-size:1.4rem;font-weight:800;color:#1a6b3c;margin-bottom:.5rem}
.done-hero p{color:#718096;font-size:.9rem;line-height:1.6;max-width:380px;margin:0 auto 1.5rem}
.saved-box{background:#f0fff4;border:1.5px solid #c6f6d5;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.saved-row{display:flex;align-items:center;gap:8px;font-size:.85rem;padding:6px 0;border-bottom:1px solid #e2e8f0}
.saved-row:last-child{border-bottom:none}
.err{background:#fff5f5;border:1.5px solid #fed7d7;border-radius:8px;padding:10px 14px;font-size:.85rem;color:#c53030;margin-bottom:1rem}
.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.saving-box{background:#fff;border-radius:14px;padding:2rem 2.5rem;text-align:center;font-size:1rem;font-weight:600;color:#1a6b3c}
.saving-box .spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:#ebf8ff;border:1.5px solid #bee3f8;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#2c5282;margin-bottom:1rem}
@media(max-width:520px){.groups-all{grid-template-columns:1fr 1fr}.thirds-grid{grid-template-columns:1fr 1fr}.scorer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.groups-all{grid-template-columns:1fr}}
</style>
</head>

// ── THIRDS LOOKUP ──
function getThirdForSlot(slot){
  if(ST.thirds.length!==8)return null;
  const key=[...ST.thirds].sort().join('');
  const entry=THIRDS_TABLE[key];
  if(!entry)return null;
  const code=entry.split(',')[slot];
  if(!code)return null;
  const g=code[1];
  const name=ST.groups[g]?ST.groups[g][2]:null;
  if(!name)return null;
  const t=GS[g].teams.find(x=>x.n===name);
  return t?{...t,_from:'3°Grp.'+g}:null;
}

function gT(src){
  if(src.t==='g'){
    const n=ST.groups[src.g]?ST.groups[src.g][src.p]:null;
    if(!n)return null;
    const t=GS[src.g].teams.find(x=>x.n===n);
    return t||{n,f:'🏳'};
  }
  if(src.t==='w')return ST.picks[src.m]||null;
  if(src.t==='l'){
    // loser = the team that played but didn't win
    const allM=[...R16,...QF,...CF,...SF,FN];
    const m=allM.find(x=>x.id===src.m);
    if(!m||!ST.picks[src.m])return null;
    const winner=ST.picks[src.m];
    const h=gT(m.hs),a=gT(m.as);
    if(!h||!a)return null;
    return h.n===winner.n?a:h;
  }
  if(src.t==='3rd')return getThirdForSlot(src.slot);
  return null;
}

  else if(s==='r16')rMatchRound('16avos de Final',R16);
  else if(s==='qf')rMatchRound('8avos de Final',QF);
  else if(s==='cf')rMatchRound('4tos de Final',CF);
  else if(s==='sf')rSF();
  else if(s==='final')rFinal();
  else if(s==='gol')rGol();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nav(){
  const pct=Math.round((ST.step/STEPS.length)*100);
  return`<div class="prog"><div class="prog-bar" style="width:${pct}%"></div></div>
  <div class="steps">${STEP_LABELS.map((l,i)=>`<span class="step${i<ST.step?' done':i===ST.step?' active':''}">${i<ST.step?'✓ ':''}${l}</span>`).join('')}</div>`;
}
function navRow(extraDisabled){
  const isLast=ST.step===STEPS.length-1;
  return`<div class="nav-row">
    ${ST.step>0?`<button class="btn btn-o" onclick="prev()">← Atrás</button>`:`<span></span>`}
    <button class="btn ${isLast?'btn-gold':'btn-g'}" ${extraDisabled?'disabled':''} onclick="next()">${isLast?'💾 Guardar quiniela':'Continuar →'}</button>
  </div>`;
}

// ── NAME ──
function rName(){
  APP.innerHTML=`<div class="hero"><div class="emo">⚽</div><h2>Quiniela Mundial 2026</h2>
  <p>Predice los grupos, elige los mejores terceros, avanza ronda a ronda hasta el campeón y el goleador.</p></div>
  <div class="card"><div class="card-hdr"><h2>¿Cuál es tu nombre?</h2></div>
  <div class="card-body"><input type="text" id="ni" placeholder="Escribe tu nombre" maxlength="30" value="${e(ST.name)}" oninput="ST.name=this.value.trim()"></div></div>
  <button class="btn btn-g btn-block" id="bstart" onclick="next()" ${!ST.name?'disabled':''}>Comenzar →</button>`;
  const i=document.getElementById('ni');
  if(i){i.focus();i.addEventListener('input',()=>{document.getElementById('bstart').disabled=!i.value.trim();});}
}

// ── GROUPS: click to rank ──
function rGroups(){
  const allDone=Object.keys(GS).every(g=>ST.groups[g].every(v=>v!==null));
  APP.innerHTML=`${nav()}
  <div class="info-box">👆 Toca cada equipo en el orden que crees que van a terminar (1°, 2°, 3°, 4°). Toca de nuevo para desmarcar.</div>
  <div class="groups-all">${Object.keys(GS).map(g=>groupCard(g)).join('')}</div>
  ${navRow(!allDone)}`;
}

function groupCard(g){
  const order=ST.groups[g]; // [name|null, name|null, name|null, name|null]
  const rankedSet=new Set(order.filter(Boolean));
  return`<div class="group-card" id="gc-${g}">
    <div class="group-hdr">Grupo ${g} <small>${rankedSet.size}/4 elegidos</small></div>
    ${GS[g].teams.map(t=>{
      const pos=order.indexOf(t.n); // -1 if not ranked
      const ranked=pos>=0;
      const rankCls=ranked?`ranked-${pos+1}`:'';
      const badgeCls=ranked?`rb-${pos+1}`:'rb-empty';
      const badgeTxt=ranked?(pos+1)+'°':'·';
      return`<div class="team-btn-row ${rankCls}" onclick="toggleRank('${g}','${e(t.n)}')">
        <div class="rank-badge ${badgeCls}">${badgeTxt}</div>
        <div class="team-info">
          <span class="team-flag">${t.f}</span>
          <span class="team-name-txt">${e(t.n)}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function toggleRank(g,teamName){
  const order=[...ST.groups[g]];
  const pos=order.indexOf(teamName);
  if(pos>=0){
    // Already ranked — remove it, shift others down
    order[pos]=null;
    // compact: move nulls to end
    const filled=order.filter(Boolean);
    while(filled.length<4)filled.push(null);
    ST.groups[g]=filled;
  } else {
    // Not ranked — add to next available slot
    const nextSlot=order.indexOf(null);
    if(nextSlot<0)return; // all slots full (shouldn't happen if UI correct)
    order[nextSlot]=teamName;
    ST.groups[g]=order;
  }
  // Re-render just this card
  const card=document.getElementById('gc-'+g);
  if(card){
    const tmp=document.createElement('div');
    tmp.innerHTML=groupCard(g);
    card.replaceWith(tmp.firstChild);
  }
  // Check if all done to enable/disable next button
  const allDone=Object.keys(GS).every(gg=>ST.groups[gg].every(v=>v!==null));
  const btn=document.getElementById('btn-next-groups');
  if(btn)btn.disabled=!allDone;
}

// ── THIRDS ──
function rThirds(){
  // Build thirds from current group order (position index 2)
  const thirds=Object.keys(GS).map(g=>{
    const name=ST.groups[g][2];
    const t=name?GS[g].teams.find(x=>x.n===name):null;
    return{g,t:t||{n:name||'?',f:'🏳'}};
  });
  const cnt=ST.thirds.length;
  APP.innerHTML=`${nav()}
  <div class="card"><div class="card-hdr"><h2>Elige los 8 mejores terceros</h2>
  <span class="badge ${cnt===8?'b-green':'b-amber'}">${cnt}/8</span></div>
  <div class="card-body">
  <p style="font-size:.82rem;color:#718096;margin-bottom:12px">¿Cuáles 8 equipos en <strong>3° lugar</strong> crees que clasifican a 16avos? Tu elección determina los cruces.</p>
  <div class="thirds-grid">${thirds.map(({g,t})=>{
    const sel=ST.thirds.includes(g);
    return`<button class="third-btn${sel?' selected':''}" onclick="tog3('${g}')">
      <span class="chk">${sel?'✓':''}</span>
      <span style="font-size:1rem">${t.f}</span>
      <span><strong>3°${g}</strong> ${e(t.n)}</span>
    </button>`;
  }).join('')}</div>
  </div></div>
  ${navRow(cnt!==8)}`;
}

function tog3(g){
  const i=ST.thirds.indexOf(g);
  if(i>=0)ST.thirds.splice(i,1);
  else{if(ST.thirds.length>=8)return;ST.thirds.push(g);}
  rThirds();
}

// ── MATCH CARDS ──
function mCard(m){
  const h=gT(m.hs),a=gT(m.as),w=ST.picks[m.id];
  const hw=w&&h&&w.n===h.n,aw=w&&a&&w.n===a.n;
  const ok=!!h&&!!a;
  return`<div class="match-card${w?' done':''}" id="mc-${m.id}">
  <div class="match-lbl">${m.num}<span>${m.hl} vs ${m.al}</span></div>
  <div class="match-team${hw?' winner':''}${!h?' pending':''}" onclick="${ok?`pick('${m.id}','h')`:''}">
    <span class="team-flag">${h?h.f:'🏳'}</span>
    <span class="team-name-txt">${h?(e(h.n)+(h._from?` <small style="color:#718096;font-size:.65rem">(${h._from})</small>`:'')):'pendiente…'}</span>
    <span class="win-icon">✓</span>
  </div>
  <div class="mdiv"></div>
  <div class="match-team${aw?' winner':''}${!a?' pending':''}" onclick="${ok?`pick('${m.id}','a')`:''}">
    <span class="team-flag">${a?a.f:'🏳'}</span>
    <span class="team-name-txt">${a?(e(a.n)+(a._from?` <small style="color:#718096;font-size:.65rem">(${a._from})</small>`:'')):'pendiente…'}</span>
    <span class="win-icon">✓</span>
  </div>
  </div>`;
}

function rMatchRound(title,matches){
  APP.innerHTML=`${nav()}
  <div class="round-hdr">${title}<small>toca el equipo ganador</small></div>
  <div class="match-list">${matches.map(m=>mCard(m)).join('')}</div>
  ${navRow()}`;
}

function rSF(){
  APP.innerHTML=`${nav()}
  <div class="round-hdr">Semifinal<small>P101 y P102</small></div>
  <div class="match-list">${SF.map(m=>mCard(m)).join('')}</div>
  ${navRow()}`;
}

function rFinal(){
  APP.innerHTML=`${nav()}
  <div class="round-hdr" style="background:#c8952a">🥉 3° y 4° Lugar — P103<small>perdedores de semis</small></div>
  <div class="match-list" style="margin-bottom:1.5rem">${mCard(THIRD_PLACE)}</div>
  <div class="round-hdr">🏆 Gran Final — P104<small>el campeón del mundo</small></div>
  <div class="match-list">${mCard(FN)}</div>
  ${navRow()}`;
}

function pick(id,side){
  const all=[...R16,...QF,...CF,...SF,THIRD_PLACE,FN];
  const m=all.find(x=>x.id===id);if(!m)return;
  const src=side==='h'?m.hs:m.as;
  const t=gT(src);if(!t)return;
  ST.picks[id]={n:t.n,f:t.f};
  const s=STEPS[ST.step];
  if(s==='r16')rMatchRound('16avos de Final',R16);
  else if(s==='qf')rMatchRound('8avos de Final',QF);
  else if(s==='cf')rMatchRound('4tos de Final',CF);
  else if(s==='sf')rSF();
  else if(s==='final')rFinal();
}

// ── GOLEADOR ──
function rGol(){
  const ch=ST.picks['p104'];
  const t34=ST.picks['p103'];
  APP.innerHTML=`${nav()}
  ${ch?`<div class="champ-box"><div class="trophy">🏆</div><h3>Tu campeón pronosticado</h3><div class="team">${ch.f} ${e(ch.n)}</div></div>`:`<div class="err">Completa la fase eliminatoria primero.</div>`}
  ${t34?`<div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:10px 16px;margin-bottom:1rem;font-size:.85rem;display:flex;align-items:center;gap:8px"><span>🥉</span><span>3° lugar: <strong>${t34.f} ${e(t34.n)}</strong></span></div>`:''}
  <div class="card"><div class="card-hdr"><h2>👟 Goleador del torneo</h2></div>
  <div class="card-body">
    <p style="font-size:.8rem;color:#718096;margin-bottom:10px">Selecciona o escribe el nombre del goleador:</p>
    <div class="scorer-grid" id="scorer-grid">${SCORERS.map(s=>{
      const sel=ST.goleador===s;
      return`<button class="scorer-btn${sel?' selected':''}" onclick="setSc('${e(s)}')">${e(s)}</button>`;
    }).join('')}
    <button class="scorer-btn${!SCORERS.includes(ST.goleador)&&ST.goleador?' selected':''}" onclick="setSc('otro')" id="otro-btn">✏️ Otro jugador</button>
    </div>
    <div id="otro-input" style="display:${!SCORERS.includes(ST.goleador)&&ST.goleador?'block':'none'};margin-top:10px">
      <input type="text" id="gi" placeholder="Nombre del goleador…" value="${!SCORERS.includes(ST.goleador)?e(ST.goleador):''}" oninput="ST.goleador=this.value">
    </div>
  </div></div>
  ${navRow(!ST.goleador)}`;
}

function setSc(n){
  if(n==='otro'){
    ST.goleador='';
    document.getElementById('otro-input').style.display='block';
    document.getElementById('gi').focus();
    document.querySelectorAll('.scorer-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById('otro-btn').classList.add('selected');
  } else {
    ST.goleador=n;
    document.getElementById('otro-input').style.display='none';
    document.querySelectorAll('.scorer-btn').forEach(b=>b.classList.toggle('selected',b.textContent===n));
  }
  // update next button
  const nb=APP.querySelector('.btn-gold,.btn-g[onclick="next()"]');
}

// ── NAV ──
function next(){
  const s=STEPS[ST.step];
  if(s==='name'&&!ST.name)return;
  if(s==='groups'){
    const allDone=Object.keys(GS).every(g=>ST.groups[g].every(v=>v!==null));
    if(!allDone){alert('Completa el orden de todos los grupos primero');return;}
  }
  if(s==='thirds'&&ST.thirds.length!==8){alert('Debes elegir exactamente 8 terceros');return;}
  if(s==='gol'){
    const gi=document.getElementById('gi');if(gi)ST.goleador=gi.value.trim();
    save();return;
  }
  if(ST.step<STEPS.length-1){ST.step++;R();}
}
function prev(){
  if(ST.step>0){ST.step--;R();}
}

// ── SAVE ──
async function save(){
  const gi=document.getElementById('gi');if(gi)ST.goleador=gi.value.trim();
  if(!ST.goleador){alert('Elige o escribe el nombre del goleador');return;}
  const ov=document.createElement('div');ov.className='saving-overlay';
  ov.innerHTML='<div class="saving-box"><span class="spin">⚽</span>Guardando tu quiniela…</div>';
  document.body.appendChild(ov);
  try{
    const data={name:ST.name,groups:ST.groups,thirds:ST.thirds,picks:ST.picks,goleador:ST.goleador,savedAt:new Date().toISOString()};
    await supaInsert(ST.name,data);
    document.body.removeChild(ov);
    rDone();
  }catch(err){
    document.body.removeChild(ov);
    APP.innerHTML=`<div class="err">❌ Error al guardar: ${e(err.message)}<br><br><button class="btn btn-g" onclick="save()">Reintentar</button></div>`;
  }
}

function rDone(){
  const ch=ST.picks['p104'];
  const t34=ST.picks['p103'];
  APP.innerHTML=`<div class="done-hero"><div class="emo">🎉</div><h2>¡Quiniela guardada, ${e(ST.name)}!</h2>
  <p>Tu quiniela ya está registrada. El administrador puede verla en tiempo real.</p></div>
  <div class="saved-box">
    <div class="saved-row">🏆 <strong>Campeón:</strong>&nbsp;${ch?ch.f+' '+e(ch.n):'—'}</div>
    <div class="saved-row">🥉 <strong>3° lugar:</strong>&nbsp;${t34?t34.f+' '+e(t34.n):'—'}</div>
    <div class="saved-row">👟 <strong>Goleador:</strong>&nbsp;${e(ST.goleador)}</div>
    <div class="saved-row">📅 <strong>Guardado:</strong>&nbsp;${new Date().toLocaleString('es')}</div>
  </div>
  <button class="btn btn-o btn-block" onclick="reset()">Llenar otra quiniela</button>`;
}

function reset(){
  ST={step:0,name:'',groups:{},thirds:[],picks:{},goleador:''};
  Object.keys(GS).forEach(g=>{ST.groups[g]=[null,null,null,null];});
  R();
}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
R();
</script>
</body>
</html>
