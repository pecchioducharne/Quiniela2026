<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Admin – Quiniela Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.hdr{background:#1a3a5c;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.25);position:sticky;top:0;z-index:100}
.hdr h1{font-size:.95rem;font-weight:700;flex:1}
.badge-live{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;background:#48bb78;color:#fff;animation:pulse 2s infinite}
.badge-gold{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;background:#c8952a;color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.wrap{max-width:1000px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:1rem;overflow:hidden}
.card-hdr{padding:11px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-hdr h2{font-size:.9rem;font-weight:700;flex:1}
.card-body{padding:14px 16px}
.btn{padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-dark{background:#1a3a5c;color:#fff}.btn-dark:hover{background:#2c4f7c}
.btn-g{background:#1a6b3c;color:#fff}.btn-g:hover{background:#276749}
.btn-o{background:#fff;color:#4a5568;border:1.5px solid #e2e8f0}.btn-o:hover{border-color:#a0aec0}
.btn-red{background:#e53e3e;color:#fff;font-size:.72rem;padding:4px 9px}
.btn-gold{background:#c8952a;color:#fff}.btn-gold:hover{background:#a87820}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:7px 15px;border-radius:20px;font-size:.8rem;font-weight:500;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;font-family:inherit;color:#4a5568;transition:all .15s}
.tab:hover{border-color:#1a6b3c;color:#1a6b3c}
.tab.active{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.tab.tab-gold:hover{border-color:#c8952a;color:#c8952a}
.tab.tab-gold.active{background:#c8952a;border-color:#c8952a;color:#fff}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:10px;padding:12px 14px;text-align:center;border:1px solid #e2e8f0}
.stat .num{font-size:1.8rem;font-weight:800;color:#1a3a5c}
.stat .lbl{font-size:.7rem;color:#718096;margin-top:2px}

/* CHARTS */
.prow{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.82rem}
.pw{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px}
.pf-g{background:#1a6b3c}.pf-a{background:#c8952a}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#1a3a5c;color:#fff;padding:9px 10px;text-align:left;font-weight:600;font-size:.75rem;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
tr:nth-child(even) td{background:#f7fafc}
.nl{cursor:pointer;color:#1a3a5c;text-decoration:underline;font-weight:600}

/* MATCH CARDS (same style as index) */
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff;transition:border-color .15s}
.match-card.done{border-color:#c6f6d5}
.match-lbl{font-size:.68rem;color:#fff;padding:5px 12px;font-weight:600;background:#1a3a5c;display:flex;justify-content:space-between;align-items:center}
.match-lbl span{opacity:.75;font-size:.62rem;font-weight:400}
.match-team{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s}
.match-team:hover{background:#f7fafc}
.match-team.winner{background:#f0fff4}
.match-team.winner .mname{color:#276749;font-weight:700}
.match-team.pending{cursor:not-allowed;opacity:.4}
.win-icon{font-size:.8rem;color:#1a6b3c;opacity:0;margin-left:auto;transition:opacity .12s}
.match-team.winner .win-icon{opacity:1}
.mdiv{height:1px;background:#f0f4f8;margin:0 12px}
.round-hdr{background:#1a3a5c;color:#fff;border-radius:8px;padding:8px 14px;margin-bottom:10px;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.round-hdr small{font-size:.68rem;opacity:.75;font-weight:400}

/* GROUPS REAL RESULTS */
.groups-real-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.group-real-card{background:#fff;border-radius:10px;border:1.5px solid #e2e8f0;overflow:hidden}
.group-real-hdr{padding:8px 12px;background:#1a6b3c;color:#fff;font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.team-real-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f0f4f8;cursor:pointer;transition:background .12s;user-select:none}
.team-real-row:last-child{border-bottom:none}
.team-real-row:hover{background:#f7fafc}
.team-real-row.pos1{background:#f0fff4}
.team-real-row.pos2{background:#f0fff4}
.team-real-row.pos3{background:#fffbf0}
.pos-badge-real{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.pr1{background:#1a6b3c;color:#fff}.pr2{background:#276749;color:#fff}
.pr3{background:#fefcbf;color:#744210;border:1px solid #d69e2e}.pr4{background:#edf2f7;color:#718096}
.pr-empty{background:#f3f4f6;color:#cbd5e0;font-size:1rem}

/* THIRDS REAL */
.thirds-real-grid{display:flex;flex-wrap:wrap;gap:8px}
.third-real-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;background:#fff;font-family:inherit;font-size:.82rem;transition:all .12s;user-select:none}
.third-real-btn.selected{border-color:#1a6b3c;background:#f0fff4}
.third-real-btn .chk{width:18px;height:18px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;transition:all .12s}
.third-real-btn.selected .chk{background:#1a6b3c;border-color:#1a6b3c;color:#fff}

/* SCORE TABLE */
.score-pos{width:26px;height:26px;border-radius:50%;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sp1{background:#FFD700;color:#6b4c00}.sp2{background:#C0C0C0;color:#333}.sp3{background:#CD7F32;color:#fff}.spn{background:#edf2f7;color:#718096}
.pts-cell{text-align:center;font-weight:700;color:#1a3a5c}
.pts-zero{color:#cbd5e0;font-weight:400}

/* IMPORT */
.import-ta{width:100%;height:80px;font-size:.75rem;font-family:monospace;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px;resize:none;outline:none;transition:border-color .15s}
.import-ta:focus{border-color:#1a6b3c}

/* LEADERBOARD mini */
.leader-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f4f8;font-size:.85rem}
.leader-row:last-child{border-bottom:none}
.leader-pts{font-size:1rem;font-weight:800;color:#1a3a5c;min-width:48px;text-align:right}

/* DETAIL */
.drow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f4f8;font-size:.83rem}
.drow:last-child{border-bottom:none}
.stitle{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#718096;margin:14px 0 6px;padding-top:10px;border-top:1px solid #f0f4f8}
.stitle:first-child{border-top:none;margin-top:0}
.round-badge{display:inline-block;background:#1a3a5c;color:#fff;border-radius:6px;padding:3px 10px;font-size:.7rem;font-weight:700}
.chip{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
.chip-g{background:#c6f6d5;color:#276749}
.chip-w{background:#f0fff4;color:#1a6b3c;border:1px solid #c6f6d5}
.chip-3{background:#fefcbf;color:#744210;border:1px solid #d69e2e}

/* PTS KEY */
.pts-key{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:1rem}
.pts-key-card{background:#f7fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0;font-size:.78rem}
.pts-key-card h4{font-weight:700;color:#1a3a5c;margin-bottom:6px;font-size:.8rem}
.pts-key-card li{list-style:none;padding:2px 0;color:#4a5568;display:flex;justify-content:space-between;gap:8px}
.pts-key-card li b{color:#1a6b3c}

.empty{text-align:center;padding:3rem;color:#a0aec0;font-size:.9rem;line-height:2}
.top-bar{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.upd{font-size:.72rem;color:#718096}
.alert-info{background:#ebf8ff;border:1.5px solid #bee3f8;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#2c5282;margin-bottom:1rem}
.loading{text-align:center;padding:2rem;color:#718096}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cbox{text-align:center;padding:1rem;border:2px solid #d69e2e;border-radius:10px;background:linear-gradient(135deg,#fffbf0,#fef9e7);margin-bottom:.75rem}
.cbox .emo{font-size:1.8rem;margin-bottom:.3rem}.cbox h3{font-size:.75rem;font-weight:600;color:#744210;margin-bottom:.25rem}.cbox .team{font-size:1.1rem;font-weight:800}
.gol-box{background:#ebf8ff;border:1.5px solid #bee3f8;border-radius:10px;padding:10px 16px;margin-bottom:.75rem;display:flex;align-items:center;gap:10px;font-size:.85rem}
.cmp-wrap{overflow-x:auto}
.cmp-table{white-space:nowrap;min-width:600px}
.cmp-table th{font-size:.72rem;padding:7px 10px}
.cmp-table td{font-size:.75rem;padding:6px 10px}
.cmp-grp td{background:#1a3a5c!important;color:#fff;font-weight:700;font-size:.7rem;letter-spacing:.04em;padding:5px 10px}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}}
.score-inp{width:42px;height:30px;text-align:center;border:1.5px solid #e2e8f0;border-radius:6px;font-size:.9rem;font-weight:700;padding:0 4px;font-family:inherit;outline:none;-moz-appearance:textfield;background:#fff;flex-shrink:0}.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.score-inp:focus{border-color:#1a6b3c}

.match-sched{font-size:.58rem;color:rgba(255,255,255,.7);font-weight:400;font-style:normal;margin-left:4px}
</style>
</head>

async function supaUpsertReal(data){

    qs=rows.map(r=>({...r.data,_id:r.id,_created:r.created_at}));

}

// ── THIRDS RESOLVER (for real results) ──
function getRealThirdSlot(slot){
  if(!real.thirds||real.thirds.length!==8)return null;
  const key=[...real.thirds].sort().join('');
  const entry=TT[key];
  if(!entry)return null;
  const code=entry.split(',')[slot];
  if(!code)return null;
  const g=code[1];
  const groupOrder=real.groups[g];
  if(!groupOrder)return null;
  const name=groupOrder[2];
  if(!name)return null;
  const t=GS[g]?GS[g].teams.find(x=>x.n===name):null;
  return t?{...t,_from:'3°Grp.'+g}:null;
}

function getRealTeam(src){
  if(src.t==='g'){
    const ord=real.groups[src.g];
    if(!ord)return null;
    const name=ord[src.p];
    if(!name)return null;
    const t=GS[src.g].teams.find(x=>x.n===name);
    return t||{n:name,f:'🏳'};
  }
  if(src.t==='w')return real.picks[src.m]||null;
  if(src.t==='l'){
    const allM=[...R16,...QF,...CF,...SF,FN];
    const m=allM.find(x=>x.id===src.m);
    if(!m||!real.picks[src.m])return null;
    const winner=real.picks[src.m];
    const h=getRealTeam(m.hs),a=getRealTeam(m.as);
    if(!h||!a)return null;
    return h.n===winner.n?a:h;
  }
  if(src.t==='3rd')return getRealThirdSlot(src.slot);
  return null;
}

// ── SCORING ──
function mRes(id,R,q){
  const rw=(R.picks||{})[id],qw=(q.picks||{})[id];
  if(!rw||!qw||rw.n!==qw.n)return 0;
  const rs=((R.scores||{})[id])||{},qs=((q.scores||{})[id])||{};
  const rh=rs.h,ra=rs.a,qh=qs.h,qa=qs.a;
  if(rh===''||rh===undefined||ra===''||ra===undefined||qh===''||qh===undefined||qa===''||qa===undefined)return 3;
  if(Number(rh)===Number(qh)&&Number(ra)===Number(qa))return 6;
  if((Number(rh)-Number(ra))===(Number(qh)-Number(qa)))return 4;
  return 3;
}
function mBono(id,bono,R,q){
  const rw=(R.picks||{})[id],qw=(q.picks||{})[id];
  if(!rw||!qw||rw.n!==qw.n)return 0;
  const rs=((R.scores||{})[id])||{},qs=((q.scores||{})[id])||{};
  const rh=rs.h,ra=rs.a,qh=qs.h,qa=qs.a;
  if(rh===''||rh===undefined||ra===''||ra===undefined||qh===''||qh===undefined||qa===''||qa===undefined)return 0;
  return(Number(rh)===Number(qh)&&Number(ra)===Number(qa))?bono:0;
}
function scoreQ(q){
  const R=real||{groups:{},thirds:[],picks:{},goleador:''};
  let r16q=0,r16b=0,r16e=0;
  let qfq=0,qfb=0,qfe=0;
  let cfq=0,cfb=0,cfe=0;
  let sfq=0,sfb=0,sfe=0;
  let tpq=0,tpb=0,tpe=0;
  let fnq=0,fnb=0,fne=0;
  let ter=0,sub=0,cam=0,gol=0;

  // R16: group stage qualifiers
  const realQ16=new Set(),realQ16pos={};
  Object.keys(GS).forEach(g=>{const ord=R.groups&&R.groups[g];if(!ord)return;[0,1].forEach(p=>{if(ord[p]){realQ16.add(ord[p]);realQ16pos[ord[p]]={g,pos:p};}});});
  if(R.thirds)R.thirds.forEach(g=>{const ord=R.groups&&R.groups[g];if(ord&&ord[2]){realQ16.add(ord[2]);realQ16pos[ord[2]]={g,pos:2};}});
  const predQ16=new Set(),predQ16pos={};
  Object.keys(GS).forEach(g=>{const ord=q.groups&&q.groups[g];if(!ord)return;[0,1].forEach(p=>{if(ord[p]){predQ16.add(ord[p]);predQ16pos[ord[p]]={g,pos:p};}});});
  if(q.thirds)q.thirds.forEach(g=>{const ord=q.groups&&q.groups[g];if(ord&&ord[2]){predQ16.add(ord[2]);predQ16pos[ord[2]]={g,pos:2};}});
  predQ16.forEach(t=>{if(realQ16.has(t)){r16q+=4;const rp=realQ16pos[t],pp=predQ16pos[t];if(rp&&pp&&rp.g===pp.g&&rp.pos===pp.pos)r16q+=2;}});
  R16_IDS.forEach(id=>{r16b+=mBono(id,2,R,q);r16e+=mRes(id,R,q);});

  // QF (8avos)
  const realTQF={},predTQF={};
  R16_IDS.forEach(id=>{const w=R.picks&&R.picks[id];if(w)realTQF[w.n]=r16ToQF[id];});
  R16_IDS.forEach(id=>{const w=q.picks&&q.picks[id];if(w)predTQF[w.n]=r16ToQF[id];});
  const realQFset=new Set(Object.keys(realTQF)),predQFset=new Set(Object.keys(predTQF));
  predQFset.forEach(t=>{if(realQFset.has(t)){qfq+=4;if(realTQF[t]&&predTQF[t]===realTQF[t])qfb+=1;}});
  QF_IDS.forEach(id=>{qfb+=mBono(id,2,R,q);qfe+=mRes(id,R,q);});

  // CF (4tos)
  const realTCF={},predTCF={};
  QF_IDS.forEach(id=>{const w=R.picks&&R.picks[id];if(w)realTCF[w.n]=qfToCF[id];});
  QF_IDS.forEach(id=>{const w=q.picks&&q.picks[id];if(w)predTCF[w.n]=qfToCF[id];});
  const realCFset=new Set(Object.keys(realTCF)),predCFset=new Set(Object.keys(predTCF));
  predCFset.forEach(t=>{if(realCFset.has(t)){cfq+=7;if(realTCF[t]&&predTCF[t]===realTCF[t])cfb+=1;}});
  CF_IDS.forEach(id=>{cfb+=mBono(id,2,R,q);cfe+=mRes(id,R,q);});

  // SF (Semis)
  const realTSF={},predTSF={};
  CF_IDS.forEach(id=>{const w=R.picks&&R.picks[id];if(w)realTSF[w.n]=cfToSF[id];});
  CF_IDS.forEach(id=>{const w=q.picks&&q.picks[id];if(w)predTSF[w.n]=cfToSF[id];});
  const realSFset=new Set(Object.keys(realTSF)),predSFset=new Set(Object.keys(predTSF));
  predSFset.forEach(t=>{if(realSFset.has(t)){sfq+=10;if(realTSF[t]&&predTSF[t]===realTSF[t])sfb+=1;}});
  SF_IDS.forEach(id=>{sfb+=mBono(id,4,R,q);sfe+=mRes(id,R,q);});

  // 3rd/4th place (SF losers)
  const rCF97=R.picks&&R.picks['cf_p97'],rCF98=R.picks&&R.picks['cf_p98'],rSF101=R.picks&&R.picks['sf_p101'];
  const rCF99=R.picks&&R.picks['cf_p99'],rCF100=R.picks&&R.picks['cf_p100'],rSF102=R.picks&&R.picks['sf_p102'];
  const realTP1=rSF101&&rCF97&&rCF98?(rSF101.n===rCF97.n?rCF98:rCF97):null;
  const realTP2=rSF102&&rCF99&&rCF100?(rSF102.n===rCF99.n?rCF100:rCF99):null;
  const pCF97=q.picks&&q.picks['cf_p97'],pCF98=q.picks&&q.picks['cf_p98'],pSF101=q.picks&&q.picks['sf_p101'];
  const pCF99=q.picks&&q.picks['cf_p99'],pCF100=q.picks&&q.picks['cf_p100'],pSF102=q.picks&&q.picks['sf_p102'];
  const predTP1=pSF101&&pCF97&&pCF98?(pSF101.n===pCF97.n?pCF98:pCF97):null;
  const predTP2=pSF102&&pCF99&&pCF100?(pSF102.n===pCF99.n?pCF100:pCF99):null;
  if(predTP1&&realTP1&&predTP1.n===realTP1.n){tpq+=8;tpb+=1;}
  else if(predTP1&&realTP2&&predTP1.n===realTP2.n){tpq+=8;}
  if(predTP2&&realTP2&&predTP2.n===realTP2.n){tpq+=8;tpb+=1;}
  else if(predTP2&&realTP1&&predTP2.n===realTP1.n){tpq+=8;}
  tpb+=mBono('p103',4,R,q);
  tpe+=mRes('p103',R,q);

  // Final
  const realFN=new Set(),realFNS={};
  SF_IDS.forEach(id=>{const w=R.picks&&R.picks[id];if(w){realFN.add(w.n);realFNS[w.n]=id;}});
  const predFN=new Set(),predFNS={};
  SF_IDS.forEach(id=>{const w=q.picks&&q.picks[id];if(w){predFN.add(w.n);predFNS[w.n]=id;}});
  predFN.forEach(t=>{if(realFN.has(t)){fnq+=15;if(realFNS[t]&&predFNS[t]===realFNS[t])fnb+=1;}});
  fnb+=mBono('p104',10,R,q);
  fne+=mRes('p104',R,q);

  // Champion / Runner-up / 3rd place winner bonuses
  const realChamp=R.picks&&R.picks['p104'],predChamp=q.picks&&q.picks['p104'];
  if(realChamp&&predChamp&&realChamp.n===predChamp.n)cam=30;
  const realRU=[...realFN].find(t=>t!==(realChamp&&realChamp.n));
  const predRU=[...predFN].find(t=>t!==(predChamp&&predChamp.n));
  if(realRU&&predRU&&realRU===predRU)sub=15;
  const realThird=R.picks&&R.picks['p103'],predThird=q.picks&&q.picks['p103'];
  if(realThird&&predThird&&realThird.n===predThird.n)ter=10;

  if(R.goleador&&q.goleador&&R.goleador.trim().toLowerCase()===q.goleador.trim().toLowerCase())gol=10;
  const total=r16q+r16b+r16e+qfq+qfb+qfe+cfq+cfb+cfe+sfq+sfb+sfe+tpq+tpb+tpe+fnq+fnb+fne+ter+sub+cam+gol;
  return{r16q,r16b,r16e,qfq,qfb,qfe,cfq,cfb,cfe,sfq,sfb,sfe,tpq,tpb,tpe,fnq,fnb,fne,ter,sub,cam,gol,total};
}

function updateScoreReal(id,side,val){
  if(!real.scores)real.scores={};
  if(!real.scores[id])real.scores[id]={h:'',a:''};
  const n=parseInt(val);
  real.scores[id][side]=isNaN(n)?'':n;
  saveReal();
  const sc=real.scores[id];
  if(sc.h!==''&&sc.a!==''){
    const hv=parseInt(sc.h),av=parseInt(sc.a);
    if(hv>av)pickReal(id,'h');
    else if(av>hv)pickReal(id,'a');
    else rResults();
  }
}

function rResults(){
  view='results';
  const sy=window.scrollY;

    const order=real.groups[g]||[null,null,null,null];
    const rankedSet=new Set(order.filter(Boolean));

      const ranked=pos>=0;
      const rowCls=ranked?`pos${pos+1}`:'';
      const badgeCls=ranked?`pr${pos+1}`:'pr-empty';
      const badgeTxt=ranked?(pos+1)+'°':'·';
      h+=`<div class="team-real-row ${rowCls}" onclick="toggleRealRank('${g}','${e(t.n)}')">
        <div class="pos-badge-real ${badgeCls}">${badgeTxt}</div>
        <span style="font-size:1rem">${t.f}</span>
        <span style="font-size:.82rem;font-weight:${ranked&&pos<2?600:400};flex:1">${e(t.n)}</span>
        ${ranked&&pos===0?`<span class="chip chip-g" style="font-size:.65rem">1°</span>`:''}
        ${ranked&&pos===1?`<span class="chip" style="background:#bee3f8;color:#2b6cb0;font-size:.65rem">2°</span>`:''}
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div></div>`;

  // THIRDS
  const cnt=(real.thirds||[]).length;
  h+=`<div class="card"><div class="card-hdr"><h2>🥉 Terceros que clasificaron</h2><span class="chip ${cnt===8?'chip-g':'chip-3'}" id="thirds-cnt-real">${cnt}/8</span></div><div class="card-body">
  <p style="font-size:.82rem;color:#718096;margin-bottom:10px">¿Cuáles 8 grupos clasificaron su 3° lugar?</p>
  <div class="thirds-real-grid">${Object.keys(GS).map(g=>{
    const sel=(real.thirds||[]).includes(g);
    const name=real.groups[g]&&real.groups[g][2]||'?';
    const t=GS[g].teams.find(x=>x.n===name)||{f:'🏳'};
    return`<button class="third-real-btn${sel?' selected':''}" id="rb3r_${g}" onclick="toggleRealThird('${g}')"><span class="chk">${sel?'✓':''}</span><span>${t.f}</span><strong>3°${g}</strong>: ${e(name)}</button>`;
  }).join('')}</div></div></div>`;

  // MATCH ROUNDS
  function mCardReal(m){
    const h2=getRealTeam(m.hs),a2=getRealTeam(m.as),w=real.picks[m.id];
    const hw=w&&h2&&w.n===h2.n,aw=w&&a2&&w.n===a2.n;
    const ok=!!h2&&!!a2;
    const sc=SCHEDULE[m.id];
    const sh=((real.scores||{})[m.id]||{}).h??'';
    const sa=((real.scores||{})[m.id]||{}).a??'';
    const isTie=sh!==''&&sa!==''&&parseInt(sh)===parseInt(sa);
    return`<div class="match-card${w?' done':''}" id="rmc-${m.id}">
    <div class="match-lbl">${m.num}<span>${m.hl} vs ${m.al}${sc?`<em class="match-sched"> · 📅 ${sc.d} ${sc.t} VET</em>`:''}</span></div>
    <div class="match-team${hw?' winner':''}${!h2?' pending':''}" onclick="${ok?`pickReal('${m.id}','h')`:''}">
      <span style="font-size:1rem">${h2?h2.f:'🏳'}</span><span class="mname" style="flex:1;font-size:.82rem;margin-left:8px">${h2?(e(h2.n)+(h2._from?` <small style="color:#718096">(${h2._from})</small>`:'')):'pendiente…'}</span><span class="win-icon">✓</span>
      ${ok?`<input class="score-inp" type="number" min="0" max="99" value="${sh}" onclick="event.stopPropagation()" oninput="saveScoreOnly('${m.id}','h',this.value)" onchange="updateScoreReal('${m.id}','h',this.value)">`:''}
    </div>
    <div class="mdiv"></div>
    <div class="match-team${aw?' winner':''}${!a2?' pending':''}" onclick="${ok?`pickReal('${m.id}','a')`:''}">
      <span style="font-size:1rem">${a2?a2.f:'🏳'}</span><span class="mname" style="flex:1;font-size:.82rem;margin-left:8px">${a2?(e(a2.n)+(a2._from?` <small style="color:#718096">(${a2._from})</small>`:'')):'pendiente…'}</span><span class="win-icon">✓</span>
      ${ok?`<input class="score-inp" type="number" min="0" max="99" value="${sa}" onclick="event.stopPropagation()" oninput="saveScoreOnly('${m.id}','a',this.value)" onchange="updateScoreReal('${m.id}','a',this.value)">`:''}
    </div>
    ${ok&&isTie&&!w?`<div class="tie-msg">⚽ Empate — toca el equipo que pasa en penales</div>`:''}
    </div>`;
  }

  h+=`<div class="card"><div class="card-hdr"><h2>⚔️ Fase Eliminatoria — Resultados Reales</h2><span style="font-size:.75rem;color:#718096">Toca el equipo ganador</span></div><div class="card-body">`;
  h+=`<div class="round-hdr">16avos de Final<small>toca el ganador</small></div><div class="match-list" id="r16-real">${R16.map(m=>mCardReal(m)).join('')}</div>`;
  h+=`<div class="round-hdr" style="margin-top:1rem">8avos de Final<small>toca el ganador</small></div><div class="match-list" id="qf-real">${QF.map(m=>mCardReal(m)).join('')}</div>`;
  h+=`<div class="round-hdr" style="margin-top:1rem">4tos de Final<small>toca el ganador</small></div><div class="match-list" id="cf-real">${CF.map(m=>mCardReal(m)).join('')}</div>`;
  h+=`<div class="round-hdr" style="margin-top:1rem">Semifinal<small>toca el ganador</small></div><div class="match-list" id="sf-real">${SF.map(m=>mCardReal(m)).join('')}</div>`;
  h+=`<div class="round-hdr" style="margin-top:1rem;background:#c8952a">🥉 3° y 4° Lugar</div><div class="match-list">${mCardReal(TP)}</div>`;
  h+=`<div class="round-hdr" style="margin-top:1rem">🏆 Gran Final</div><div class="match-list">${mCardReal(FN)}</div>`;
  h+=`</div></div>`;

  // GOLEADOR
  h+=`<div class="card"><div class="card-hdr"><h2>👟 Goleador real del torneo</h2></div><div class="card-body">
  <input type="text" id="real-gol" value="${e(real.goleador||'')}" placeholder="Nombre del goleador real…"
  style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none"
  oninput="real.goleador=this.value;saveReal()">
  </div></div>`;

  h+=`<div style="text-align:center;margin-top:1rem"><button class="btn btn-gold" onclick="view='scores';render()">🏅 Ver puntajes →</button></div>`;
  document.getElementById('main').innerHTML=h;
  window.scrollTo(0,sy);
}

function toggleRealRank(g,teamName){
  if(!real.groups)real.groups={};
  if(!real.groups[g])real.groups[g]=[null,null,null,null];
  const order=[...real.groups[g]];
  const pos=order.indexOf(teamName);
  if(pos>=0){
    order[pos]=null;
    const filled=order.filter(Boolean);
    while(filled.length<4)filled.push(null);
    real.groups[g]=filled;
  } else {
    const next=order.indexOf(null);
    if(next<0)return;
    order[next]=teamName;
    real.groups[g]=order;
  }
  saveReal();
  // Re-render just this group card
  rResults();
}

function toggleRealThird(g){
  if(!real.thirds)real.thirds=[];
  const i=real.thirds.indexOf(g);
  if(i>=0)real.thirds.splice(i,1);
  else{if(real.thirds.length>=8){alert('Solo 8 terceros');return;}real.thirds.push(g);}
  saveReal();
  rResults();
}

function pickReal(id,side){
  const allM=[...R16,...QF,...CF,...SF,TP,FN];
  const m=allM.find(x=>x.id===id);if(!m)return;
  const src=side==='h'?m.hs:m.as;
  const t=getRealTeam(src);if(!t)return;
  if(!real.picks)real.picks={};
  real.picks[id]={n:t.n,f:t.f};
  saveReal();
  rResults();
}

// ── COMPARE ──
function rCompare(){
  view='compare';
  if(qs.length===0){rOverview();return;}
  let h=tabs('compare')+`<div class="cmp-wrap"><table class="cmp-table">
  <thead><tr><th>Predicción</th>${qs.map(q=>`<th>${e(q.name)}</th>`).join('')}</tr></thead><tbody>
  <tr><td><strong>🏆 Campeón</strong></td>${qs.map(q=>{const c=q.picks&&q.picks['p104'];return`<td>${c?c.f+' '+e(c.n):'—'}</td>`;}).join('')}</tr>
  <tr><td><strong>👟 Goleador</strong></td>${qs.map(q=>`<td>${e(q.goleador)||'—'}</td>`).join('')}</tr>
  <tr class="cmp-grp"><td colspan="${qs.length+1}">TERCEROS CLASIFICADOS</td></tr>
  ${Object.keys(GS).map(g=>`<tr><td style="padding-left:10px">3°Grp.${g}</td>${qs.map(q=>{const sel=q.thirds&&q.thirds.includes(g);const name=q.groups&&q.groups[g]?q.groups[g][2]:'?';const t=GS[g].teams.find(x=>x.n===name)||{f:'🏳'};const isR=real.thirds&&real.thirds.includes(g);return`<td style="${isR&&sel?'background:#f0fff4;font-weight:700':''}">${sel?`<span class="chip chip-3">${t.f}✓</span>${isR?'✅':''}`:''}</td>`;}).join('')}</tr>`).join('')}
  ${Object.keys(GS).map(g=>`<tr class="cmp-grp"><td colspan="${qs.length+1}">GRUPO ${g}</td></tr>
  ${[0,1,2].map(p=>`<tr><td style="padding-left:10px">${['🥇','🥈','🥉'][p]} ${p+1}°</td>
  ${qs.map(q=>{const n=q.groups&&q.groups[g]?q.groups[g][p]:'?';const t=GS[g].teams.find(x=>x.n===n)||{f:'🏳'};
  const isReal=real.groups&&real.groups[g]&&real.groups[g][p]===n;
  return`<td style="${isReal?'background:#f0fff4;font-weight:700':''}">${t.f} ${e(n)}${isReal?' ✅':''}</td>`;}).join('')}</tr>`).join('')}`).join('')}
  </tbody></table></div>`;
  document.getElementById('main').innerHTML=h;
}

// ── DETAIL ──
function rDetail(idx){
  view='detail';selIdx=idx;
  const q=qs[idx];const ch=q.picks&&q.picks['p104'];const sc=scoreQ(q);
  let h=`<div class="tabs"><button class="tab" onclick="view='overview';render()">← Volver</button><button class="tab active">👤 ${e(q.name)}</button></div>`;
  if(ch)h+=`<div class="cbox"><div class="emo">🏆</div><h3>Campeón pronosticado</h3><div class="team">${ch.f} ${e(ch.n)}</div></div>`;
  h+=`<div class="gol-box"><span style="font-size:1.3rem">👟</span><div><div style="font-size:.75rem;color:#2b6cb0;margin-bottom:2px">Goleador</div><strong>${e(q.goleador)||'—'}</strong>${sc.gol>0?` <span class="chip chip-g">+${sc.gol}pts</span>`:''}</div></div>`;
  if(hasReal()){
    h+=`<div class="card"><div class="card-hdr"><h2>🏅 Puntaje: ${sc.total} pts</h2></div><div class="card-body"><table>
    <thead><tr><th>Ronda</th><th>Clasificados</th><th>Bono/Llave</th><th>Partidos</th><th>Sub</th></tr></thead><tbody>
    ${[['16avos',sc.r16q,sc.r16b,sc.r16e],['8avos',sc.qfq,sc.qfb,sc.qfe],['4tos',sc.cfq,sc.cfb,sc.cfe],['Semis',sc.sfq,sc.sfb,sc.sfe],['3°/4°',sc.tpq,sc.tpb,sc.tpe],['Final',sc.fnq,sc.fnb,sc.fne]].map(([r,a,b,c])=>`<tr><td><strong>${r}</strong></td><td class="pts-cell">${a}</td><td class="pts-cell">${b}</td><td class="pts-cell">${c}</td><td class="pts-cell" style="font-weight:800">${a+b+c}</td></tr>`).join('')}
    <tr style="background:#fef9e7"><td><strong>Campeón</strong></td><td colspan="3"></td><td class="pts-cell" style="font-weight:800">${sc.cam}</td></tr>
    <tr><td><strong>Subcampeón</strong></td><td colspan="3"></td><td class="pts-cell" style="font-weight:800">${sc.sub}</td></tr>
    <tr style="background:#fef9e7"><td><strong>3er Lugar</strong></td><td colspan="3"></td><td class="pts-cell" style="font-weight:800">${sc.ter}</td></tr>
    <tr><td><strong>Goleador</strong></td><td colspan="3"></td><td class="pts-cell" style="font-weight:800">${sc.gol}</td></tr>
    </tbody></table></div></div>`;
  }
  h+=`<div class="card"><div class="card-hdr"><h2>📊 Grupos</h2></div><div class="card-body">`;
  Object.keys(GS).forEach(g=>{
    const ord=q.groups&&q.groups[g]?q.groups[g]:GS[g].teams.map(t=>t.n);
    h+=`<div class="stitle">Grupo ${g}</div>`;
    ord.forEach((n,i)=>{if(!n)return;const t=GS[g].teams.find(x=>x.n===n)||{n,f:'🏳'};
      const is3=i===2&&q.thirds&&q.thirds.includes(g);
      const isR=real.groups&&real.groups[g]&&real.groups[g][i]===n;
      h+=`<div class="drow"><span class="pos-badge-real pr${i+1}">${i+1}°</span><span style="font-size:1rem">${t.f}</span><span style="flex:1;font-weight:${i<2?600:400};font-size:.83rem;margin-left:4px">${e(n)}</span>${isR?`<span class="chip chip-g">✅</span>`:''}${is3?`<span class="chip chip-3" style="margin-left:4px">3°✓</span>`:''}</div>`;
    });
  });
  h+=`</div></div>`;
  const allRounds=[
    {l:'16avos de Final',defs:R16},{l:'8avos de Final',defs:QF},{l:'4tos de Final',defs:CF},
    {l:'Semifinal',defs:SF},{l:'⚽ Final',defs:[FN]}
  ];
  h+=`<div class="card"><div class="card-hdr"><h2>⚔️ Eliminatorias</h2></div><div class="card-body">`;
  allRounds.forEach(r=>{
    h+=`<div class="stitle"><span class="round-badge">${r.l}</span></div>`;
    r.defs.forEach(m=>{const w=q.picks&&q.picks[m.id];const rw=real.picks&&real.picks[m.id];const ok=w&&rw&&w.n===rw.n;
      h+=`<div class="drow"><span style="min-width:54px;font-size:.7rem;color:#a0aec0">${m.num}</span>
      ${w?`<span style="font-size:.9rem">${w.f}</span><span class="chip chip-w" style="margin-left:4px">${e(w.n)}</span>`:
      `<span style="color:#cbd5e0;font-size:.78rem;font-style:italic">sin elegir</span>`}
      ${ok?`<span class="chip chip-g" style="margin-left:auto">✅</span>`:rw&&w?`<span style="margin-left:auto;font-size:.7rem;color:#a0aec0">${rw.f}${e(rw.n)}</span>`:''}</div>`;
    });
  });
  h+=`</div></div>`;
  document.getElementById('main').innerHTML=h;
}

// ── UTILS ──
async function del(id,idx){if(!confirm('¿Eliminar quiniela de "'+qs[idx].name+'"?'))return;try{await supaDelete(id);load();}catch(ex){alert('Error: '+ex.message);}}
function gTn(n){for(const g of Object.values(GS)){const t=g.teams.find(x=>x.n===n);if(t)return t;}return null;}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
setInterval(load,30000);
</script>
