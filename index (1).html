<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiniela Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.hdr{background:#1a6b3c;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr h1{font-size:1rem;font-weight:700;flex:1}.hdr-sub{font-size:.72rem;opacity:.85}
.wrap{max-width:700px;margin:0 auto;padding:1.5rem 1rem 5rem}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:1rem;overflow:hidden}
.card-hdr{padding:11px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.card-hdr h2{font-size:.9rem;font-weight:700;flex:1}
.badge{padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.b-blue{background:#bee3f8;color:#2b6cb0}.b-amber{background:#fefcbf;color:#744210}.b-green{background:#c6f6d5;color:#276749}
.hero{text-align:center;padding:2.5rem 1rem 1.5rem}
.hero .emo{font-size:3rem;margin-bottom:.75rem}
.hero h2{font-size:1.6rem;font-weight:800;color:#1a6b3c;margin-bottom:.5rem;letter-spacing:-.02em}
.hero p{color:#718096;font-size:.9rem;line-height:1.6;max-width:420px;margin:0 auto 1.5rem}
input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:#1a6b3c}
.btn{padding:11px 22px;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn-g{background:#1a6b3c;color:#fff}.btn-g:hover{background:#276749}.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:#fff;color:#4a5568;border:1.5px solid #e2e8f0}.btn-o:hover{border-color:#a0aec0}
.btn-gold{background:#c8952a;color:#fff}.btn-gold:hover{background:#a87820}
.btn-block{width:100%;margin-top:.5rem}
.prog{height:4px;background:#e2e8f0;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.prog-bar{height:100%;background:#1a6b3c;border-radius:4px;transition:width .3s}
.steps{display:flex;gap:5px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.step{padding:5px 10px;border-radius:20px;font-size:.68rem;font-weight:500;border:1.5px solid #e2e8f0;white-space:nowrap;color:#718096;background:#fff;flex-shrink:0}
.step.done{border-color:#1a6b3c;background:#f0fff4;color:#276749}
.step.active{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid #e2e8f0}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.group-card{background:#fff;border-radius:10px;border:1.5px solid #e2e8f0;overflow:hidden}
.group-hdr{padding:8px 12px;background:#1a6b3c;color:#fff;display:flex;align-items:center;font-size:.82rem;font-weight:700}
.group-hdr span{opacity:.75;font-size:.68rem;font-weight:400;margin-left:auto}
.sortable{list-style:none;padding:6px}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:7px;margin-bottom:5px;cursor:grab;user-select:none;background:#fff;transition:border-color .12s,background .12s}
.sitem:last-child{margin-bottom:0}.sitem.over{border-color:#1a6b3c;background:#f0fff4}
.pos{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.p1{background:#1a6b3c;color:#fff}.p2{background:#276749;color:#fff}.p3{background:#fefcbf;color:#744210;border:1px solid #d69e2e}.p4{background:#edf2f7;color:#718096}
.tflag{font-size:1.1rem}.tname{font-size:.82rem;font-weight:500;flex:1}.handle{color:#cbd5e0}
.thirds-list{display:flex;flex-direction:column;gap:6px}
.third-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;background:#fff;user-select:none}
.third-row.selected{border-color:#1a6b3c;background:#f0fff4}
.chk{width:20px;height:20px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:all .12s}
.chk.on{background:#1a6b3c;border-color:#1a6b3c;color:#fff}
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff;transition:border-color .15s}
.match-card.done{border-color:#c6f6d5}
.match-lbl{font-size:.68rem;color:#fff;padding:5px 12px;font-weight:600;background:#1a3a5c;display:flex;justify-content:space-between;align-items:center}
.match-lbl span{opacity:.75;font-size:.62rem;font-weight:400}
.match-team{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s}
.match-team:hover{background:#f7fafc}.match-team.winner{background:#f0fff4}
.match-team.winner .tname{color:#276749;font-weight:700}
.match-team.pending{cursor:not-allowed;opacity:.4}
.win-icon{font-size:.8rem;color:#1a6b3c;opacity:0;margin-left:auto;transition:opacity .12s}
.match-team.winner .win-icon{opacity:1}
.mdiv{height:1px;background:#f0f4f8;margin:0 12px}
.scorer-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.spill{padding:5px 11px;border-radius:20px;font-size:.75rem;cursor:pointer;background:#edf2f7;color:#4a5568;border:none;font-family:inherit;transition:all .12s}
.spill:hover{background:#fefcbf;color:#744210}
.champ-box{text-align:center;padding:1.25rem;border:2px solid #d69e2e;border-radius:10px;background:#fffbf0;margin-bottom:1rem}
.champ-box .trophy{font-size:2rem;margin-bottom:.4rem}
.champ-box h3{font-size:.78rem;font-weight:600;color:#744210;margin-bottom:.25rem}
.champ-box .team{font-size:1.2rem;font-weight:800}
.round-hdr{background:#1a3a5c;color:#fff;border-radius:8px;padding:7px 14px;margin-bottom:10px;font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.round-hdr span{font-size:.68rem;opacity:.75;font-weight:400}
.done-hero{text-align:center;padding:2.5rem 1rem}
.done-hero .emo{font-size:3.5rem;margin-bottom:1rem}
.done-hero h2{font-size:1.4rem;font-weight:800;color:#1a6b3c;margin-bottom:.5rem}
.done-hero p{color:#718096;font-size:.9rem;line-height:1.6;max-width:380px;margin:0 auto 1.5rem}
.saved-box{background:#f0fff4;border:1.5px solid #c6f6d5;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.saved-row{display:flex;align-items:center;gap:8px;font-size:.85rem;padding:6px 0;border-bottom:1px solid #e2e8f0}
.saved-row:last-child{border-bottom:none}
.err{background:#fff5f5;border:1.5px solid #fed7d7;border-radius:8px;padding:10px 14px;font-size:.85rem;color:#c53030;margin-bottom:1rem}
.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.saving-box{background:#fff;border-radius:14px;padding:2rem 2.5rem;text-align:center;font-size:1rem;font-weight:600;color:#1a6b3c}
.saving-box .spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:520px){.group-grid{grid-template-columns:1fr}}
</style>

function getThirdForSlot(slot){
  if(ST.thirds.length!==8)return null;
  const key=[...ST.thirds].sort().join('');
  const entry=THIRDS_TABLE[key];
  if(!entry)return null;
  const code=entry.split(',')[slot];
  if(!code)return null;
  const g=code[1];
  const name=ST.groups[g]?ST.groups[g][2]:null;
  if(!name)return null;
  const t=GS[g].teams.find(x=>x.n===name);
  return t?{...t,_from:'3°'+g}:null;
}
function gT(src){
  if(src.t==='g'){const n=ST.groups[src.g][src.p];const t=GS[src.g].teams.find(x=>x.n===n);return t||{n,f:'🏳'};}
  if(src.t==='w')return ST.picks[src.m]||null;
  if(src.t==='3rd')return getThirdForSlot(src.slot);
  return null;
}

  return`<div class="nav-row">
    ${ST.step>0?`<button class="btn btn-o" onclick="prev()">← Atrás</button>`:`<span></span>`}
    <button class="btn ${isLast?'btn-gold':'btn-g'}" onclick="next()">${isLast?'💾 Guardar quiniela':'Continuar →'}</button>
  </div>`;
}
function rName(){
  APP.innerHTML=`<div class="hero"><div class="emo">⚽</div><h2>Quiniela Mundial 2026</h2>
  <p>Predice los grupos, elige los mejores terceros, avanza ronda a ronda hasta el campeón y el goleador.</p></div>
  <div class="card"><div class="card-hdr"><h2>¿Cuál es tu nombre?</h2></div>
  <div class="card-body"><input type="text" id="ni" placeholder="Escribe tu nombre" maxlength="30" value="${e(ST.name)}" oninput="ST.name=this.value.trim()"></div></div>
  <button class="btn btn-g btn-block" id="bstart" onclick="next()" ${!ST.name?'disabled':''}>Comenzar →</button>`;
  const i=document.getElementById('ni');
  if(i){i.focus();i.addEventListener('input',()=>{document.getElementById('bstart').disabled=!i.value.trim();});}
}
function rGroups(keys){
  APP.innerHTML=`${nav()}<div class="card"><div class="card-hdr"><h2>${keys[0]==='A'?'Grupos A–F':'Grupos G–L'}</h2><span class="badge b-blue">arrastra para ordenar</span></div>
  <div class="card-body"><div class="group-grid" id="gg">${keys.map(g=>gCard(g)).join('')}</div></div></div>${navRow()}`;
  keys.forEach(g=>initSort(g));
}
function gCard(g){
  return`<div class="group-card"><div class="group-hdr">Grupo ${g}<span>↕ arrastra</span></div>
  <ul class="sortable" id="sl-${g}">${ST.groups[g].map((n,i)=>{const t=GS[g].teams.find(x=>x.n===n)||{n,f:'🏳'};
  return`<li class="sitem" draggable="true" data-t="${e(n)}" data-g="${g}">
  <span class="pos p${i+1}">${i+1}</span><span class="tflag">${t.f}</span><span class="tname">${e(n)}</span><span class="handle">⠿</span></li>`;}).join('')}
  </ul></div>`;
}
function initSort(g){
  const list=document.getElementById('sl-'+g);if(!list)return;let drag=null;
  list.querySelectorAll('.sitem').forEach(item=>{
    item.addEventListener('dragstart',ev=>{drag=item;ev.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{list.querySelectorAll('.sitem').forEach(i=>i.classList.remove('over'));saveOrd(g);});
    item.addEventListener('dragover',ev=>{ev.preventDefault();if(item===drag)return;
      list.querySelectorAll('.sitem').forEach(i=>i.classList.remove('over'));item.classList.add('over');
      const its=[...list.querySelectorAll('.sitem')],di=its.indexOf(drag),oi=its.indexOf(item);
      if(di<oi)item.after(drag);else item.before(drag);updBadges(g);});
    item.addEventListener('touchstart',ev=>{drag=item;item.style.opacity='.5';},{passive:true});
    item.addEventListener('touchend',()=>{item.style.opacity='';list.querySelectorAll('.sitem').forEach(i=>i.classList.remove('over'));saveOrd(g);});
    item.addEventListener('touchmove',ev=>{ev.preventDefault();
      const touch=ev.touches[0];const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const target=el?el.closest('.sitem'):null;
      if(target&&target!==drag){list.querySelectorAll('.sitem').forEach(i=>i.classList.remove('over'));target.classList.add('over');
        const its=[...list.querySelectorAll('.sitem')],di=its.indexOf(drag),oi=its.indexOf(target);
        if(di<oi)target.after(drag);else target.before(drag);updBadges(g);}},{passive:false});
  });
}
function saveOrd(g){const l=document.getElementById('sl-'+g);if(l)ST.groups[g]=[...l.querySelectorAll('.sitem')].map(i=>i.dataset.t);}
function updBadges(g){const l=document.getElementById('sl-'+g);if(!l)return;l.querySelectorAll('.sitem').forEach((it,i)=>{const b=it.querySelector('.pos');b.textContent=i+1;b.className='pos p'+(i+1);});}
function rThirds(){
  const thirds=Object.keys(GS).map(g=>{const n=ST.groups[g][2];const t=GS[g].teams.find(x=>x.n===n)||{n,f:'🏳'};return{g,t};});
  const cnt=ST.thirds.length;
  APP.innerHTML=`${nav()}<div class="card"><div class="card-hdr"><h2>Elige los 8 mejores terceros</h2>
  <span class="badge ${cnt===8?'b-green':'b-amber'}">${cnt}/8 elegidos</span></div>
  <div class="card-body"><p style="font-size:.82rem;color:#718096;margin-bottom:12px">¿Cuáles 8 equipos en 3° lugar crees que clasifican? Esto determina los cruces de 16avos.</p>
  <div class="thirds-list">${thirds.map(({g,t})=>{const sel=ST.thirds.includes(g);
  return`<div class="third-row${sel?' selected':''}" onclick="tog3('${g}')"><span class="chk${sel?' on':''}">✓</span>
  <span class="tflag">${t.f}</span><span class="tname"><strong>3° Grupo ${g}:</strong> ${e(t.n)}</span></div>`;}).join('')}
  </div></div></div>${navRow()}`;
}
function tog3(g){const i=ST.thirds.indexOf(g);if(i>=0)ST.thirds.splice(i,1);else{if(ST.thirds.length>=8)return;ST.thirds.push(g);}rThirds();}
function mCard(m){
  const h=gT(m.hs),a=gT(m.as),w=ST.picks[m.id];
  const hw=w&&h&&w.n===h.n,aw=w&&a&&w.n===a.n;
  const ok=!!h&&!!a;
  return`<div class="match-card${w?' done':''}" id="mc-${m.id}">
  <div class="match-lbl">${m.num}<span>${m.hl} vs ${m.al}</span></div>
  <div class="match-team${hw?' winner':''}${!h?' pending':''}" onclick="${ok?`pick('${m.id}','h')`:''}">
    <span class="tflag">${h?h.f:'🏳'}</span><span class="tname">${h?e(h.n)+(h._from?` <small style="color:#718096;font-size:.65rem">(${h._from})</small>`:''):'pendiente…'}</span><span class="win-icon">✓</span></div>
  <div class="mdiv"></div>
  <div class="match-team${aw?' winner':''}${!a?' pending':''}" onclick="${ok?`pick('${m.id}','a')`:''}">
    <span class="tflag">${a?a.f:'🏳'}</span><span class="tname">${a?e(a.n)+(a._from?` <small style="color:#718096;font-size:.65rem">(${a._from})</small>`:''):'pendiente…'}</span><span class="win-icon">✓</span></div>
  </div>`;
}
function rMatchRound(title,matches){
  APP.innerHTML=`${nav()}<div class="round-hdr">${title}<span>toca el equipo ganador</span></div>
  <div class="match-list">${matches.map(m=>mCard(m)).join('')}</div>${navRow()}`;
}
function rSF(){
  APP.innerHTML=`${nav()}
  <div class="round-hdr">Semifinal<span>toca el equipo ganador</span></div>
  <div class="match-list">${SF.map(m=>mCard(m)).join('')}</div>
  <div style="height:1.25rem"></div>
  <div class="round-hdr">⚽ Final — P104<span>el campeón del mundo</span></div>
  <div class="match-list">${mCard(FN)}</div>${navRow()}`;
}
function pick(id,side){
  const all=[...R16,...QF,...CF,...SF,FN];
  const m=all.find(x=>x.id===id);if(!m)return;
  const t=gT(side==='h'?m.hs:m.as);if(!t)return;
  ST.picks[id]={n:t.n,f:t.f};
  const s=STEPS[ST.step];
  if(s==='r16')rMatchRound('16avos de Final',R16);
  else if(s==='qf')rMatchRound('8avos de Final',QF);
  else if(s==='cf')rMatchRound('4tos de Final',CF);
  else if(s==='sf')rSF();
}
function rGol(){
  const ch=ST.picks['p104'];
  APP.innerHTML=`${nav()}
  ${ch?`<div class="champ-box"><div class="trophy">🏆</div><h3>Tu campeón pronosticado</h3><div class="team">${ch.f} ${e(ch.n)}</div></div>`:`<div class="err">Completa la fase eliminatoria primero.</div>`}
  <div class="card"><div class="card-hdr"><h2>👟 Goleador del torneo</h2></div>
  <div class="card-body"><input type="text" id="gi" placeholder="Nombre del goleador…" value="${e(ST.goleador)}" oninput="ST.goleador=this.value" list="sc">
  <datalist id="sc">${SCORERS.map(s=>`<option value="${e(s)}">`).join('')}</datalist>
  <div class="scorer-pills">${SCORERS.map(s=>`<button class="spill" onclick="setSc('${e(s)}')">${e(s)}</button>`).join('')}</div>
  </div></div>${navRow()}`;
}
function setSc(n){const i=document.getElementById('gi');if(i)i.value=n;ST.goleador=n;}
function next(){
  const s=STEPS[ST.step];
  if(s==='name'&&!ST.name)return;
  if(s==='thirds'&&ST.thirds.length!==8){alert('Debes elegir exactamente 8 terceros');return;}
  if(s==='g1')['A','B','C','D','E','F'].forEach(g=>saveOrd(g));
  if(s==='g2')['G','H','I','J','K','L'].forEach(g=>saveOrd(g));
  if(s==='gol'){const i=document.getElementById('gi');if(i)ST.goleador=i.value.trim();save();return;}
  if(ST.step<STEPS.length-1){ST.step++;R();}
}
function prev(){
  if(STEPS[ST.step]==='g1')['A','B','C','D','E','F'].forEach(g=>saveOrd(g));
  if(STEPS[ST.step]==='g2')['G','H','I','J','K','L'].forEach(g=>saveOrd(g));
  if(ST.step>0){ST.step--;R();}
}
async function save(){
  const i=document.getElementById('gi');if(i)ST.goleador=i.value.trim();
  if(!ST.goleador){alert('Escribe el nombre del goleador');return;}
  // Show saving overlay
  const ov=document.createElement('div');ov.className='saving-overlay';
  ov.innerHTML='<div class="saving-box"><span class="spin">⚽</span>Guardando tu quiniela…</div>';
  document.body.appendChild(ov);
  try{
    const data={name:ST.name,groups:ST.groups,thirds:ST.thirds,picks:ST.picks,goleador:ST.goleador,savedAt:new Date().toISOString()};
    await supaInsert(ST.name,data);
    document.body.removeChild(ov);
    rDone();
  }catch(err){
    document.body.removeChild(ov);
    APP.innerHTML=`<div class="err">❌ Error al guardar: ${e(err.message)}<br><br>
    <button class="btn btn-g" onclick="save()">Reintentar</button></div>`;
  }
}
function rDone(){
  const ch=ST.picks['p104'];
  APP.innerHTML=`<div class="done-hero"><div class="emo">🎉</div><h2>¡Quiniela guardada, ${e(ST.name)}!</h2>
  <p>Tu quiniela ya está registrada. El administrador puede verla en tiempo real.</p></div>
  <div class="saved-box">
    <div class="saved-row">🏆 <strong>Campeón:</strong>&nbsp;${ch?ch.f+' '+e(ch.n):'—'}</div>
    <div class="saved-row">👟 <strong>Goleador:</strong>&nbsp;${e(ST.goleador)}</div>
    <div class="saved-row">📅 <strong>Guardado:</strong>&nbsp;${new Date().toLocaleString('es')}</div>
  </div>
  <button class="btn btn-o btn-block" onclick="reset()">Llenar otra quiniela</button>`;
}
function reset(){ST={step:0,name:'',groups:{},thirds:[],picks:{},goleador:''};Object.keys(GS).forEach(g=>{ST.groups[g]=GS[g].teams.map(t=>t.n)});R();}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
R();
</script>
</body>
</html>
